name: Read Selected Values from INC File

on:
  workflow_dispatch:

jobs:
  inspect-release:
    runs-on: [self-hosted, Linux, X64, label-2]

    steps:
      - name: Extract selected INC values
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/13000393/release"

          INC_FILE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name 'm_*_*.inc' ! -name '*_nxh.inc' | head -n 1)"

          if [[ -z "${INC_FILE}" ]]; then
            echo "ERROR: No matching non-NXH INC file found in ${RELEASE_DIR}"
            exit 1
          fi

          patch_id="$(grep -i 'Patch ID' "${INC_FILE}" | sed -E 's/^[[:space:]]*dd[[:space:]]+([0-9A-Fa-f]+h).*/\1/')"
          min_runtime="$(grep -i 'Minimum Runtime Update Revision' "${INC_FILE}" | sed -E 's/^[[:space:]]*dd[[:space:]]+([0-9A-Fa-f]+h).*/\1/')"
          svn="$(grep -Ei '^[[:space:]]*dd[[:space:]]+[0-9A-Fa-f]+h[[:space:]]*;[[:space:]]*00040h[[:space:]]+SVN' "${INC_FILE}" | sed -E 's/^[[:space:]]*dd[[:space:]]+([0-9A-Fa-f]+h).*/\1/')"
          se_svn="$(grep -i 'SE_SVN' "${INC_FILE}" | sed -E 's/^[[:space:]]*dd[[:space:]]+([0-9A-Fa-f]+h).*/\1/')"

          echo "${patch_id}"
          echo "${min_runtime}"
          echo "${svn}"
          echo "${se_svn}"
