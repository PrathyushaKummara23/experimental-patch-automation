name: Read Release Directory and INC File

on:
  workflow_dispatch:

jobs:
  inspect-release:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Inspect release directory and read non-NXH INC file
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/13000393/release"

          echo "Release directory: ${RELEASE_DIR}"
          echo "================ Directory Contents ================"
          ls -lah "${RELEASE_DIR}"

          echo
          echo "================ Finding INC file ================"

          INC_FILE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name 'm_*_*.inc' ! -name '*_nxh.inc' | head -n 1)"

          if [[ -z "${INC_FILE}" ]]; then
            echo "ERROR: No matching non-NXH INC file found in ${RELEASE_DIR}"
            exit 1
          fi

          echo "Selected INC file: ${INC_FILE}"
          echo
          echo "================ INC File Contents ================"
          cat "${INC_FILE}"
