name: SRF SSH Login - Test

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID for tracking'
        required: false
        type: string
        default: ''
      trigger_source:
        description: 'Source that triggered the workflow'
        required: false
        type: string
        default: 'unknown'
      callback_url:
        description: 'Callback URL for notifications'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      session_id:
        description: 'Session ID for tracking'
        required: false
        type: string
        default: ''
      trigger_source:
        description: 'Source that triggered the workflow'
        required: false
        type: string
        default: 'unknown'
      callback_url:
        description: 'Callback URL for notifications'
        required: false
        type: string
        default: ''
    secrets:
      SRF_PASSWORD:
        required: true

jobs:
  srf-login:
    name: SRF SSH Login
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Session Info Display
        if: ${{ inputs.session_id != '' }}
        shell: bash
        run: |
          echo "Session ID: ${{ inputs.session_id }}"
          echo "Triggered by: ${{ inputs.trigger_source }}"
          echo "Callback URL: ${{ inputs.callback_url }}"

      - name: SSH into SRF host and run deploy_reboot_wrapper.py
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        shell: bash
        run: |
          set -e

          echo "================================================="
          echo "  SRF SSH Login - Post Build Auto Login"
          echo "================================================="

          cat > /tmp/ssh_login_${{ github.run_id }}.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 3000
          set password $env(SRF_PASSWORD)

          spawn ssh -T -o StrictHostKeyChecking=no CEFLS_User@10.138.186.133

          expect {
            "*assword:*" { send "$password\r" }
            timeout      { puts "FAILURE: Connection timed out"; exit 1 }
          }

          expect {
            "*>*" { send "whoami\r" }
            timeout { puts "FAILURE: Shell prompt not received"; exit 1 }
          }

          expect {
            "*>*" { send "cd C:\\pkummara\\scripts\r" }
            timeout { puts "FAILURE: whoami did not complete"; exit 1 }
          }

          expect {
            "*>*" { send "C:\\Python310\\python.exe -u .\\deploy_reboot_wrapper.py\r" }
            timeout { puts "FAILURE: cd to scripts directory did not complete"; exit 1 }
          }

          expect {
            "*>*" { send "exit\r" }
            timeout { puts "FAILURE: Python script did not complete"; exit 1 }
          }

          expect eof
          EOF

          chmod +x /tmp/ssh_login_${{ github.run_id }}.exp
          echo "Connecting to SRF host via SSH..."
          /usr/bin/expect /tmp/ssh_login_${{ github.run_id }}.exp
          SSH_EXIT=$?
          rm -f /tmp/ssh_login_${{ github.run_id }}.exp

          if [ $SSH_EXIT -eq 0 ]; then
            echo "SUCCESS: SSH login and command executed successfully"
          else
            echo "FAILURE: SSH connection failed with exit code: $SSH_EXIT"
            exit $SSH_EXIT
          fi

      - name: Send SRF Login Notification
        if: ${{ inputs.callback_url != '' }}
        shell: bash
        run: |
          echo "Sending SRF login notification..."

          CALLBACK_URL="${{ inputs.callback_url }}"
          SESSION_ID="${{ inputs.session_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            PAYLOAD=$(printf '{"session_id":"%s","status":"srf_login_completed","message":"SRF login process completed","workflow_run_id":"%s","timestamp":"%s","trigger_source":"%s","srf_login_details":{"host":"10.138.186.133","user":"CEFLS_User","login_timestamp":"%s"}}' \
              "$SESSION_ID" \
              "${{ github.run_id }}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "${{ inputs.trigger_source }}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
            curl --noproxy 127.0.0.1 -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "Failed to send SRF login notification"
          else
            echo "No callback URL provided, skipping notification"
          fi
