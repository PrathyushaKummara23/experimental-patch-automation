  name: Run SRF SED Build on Windows

on:
  workflow_dispatch:
    inputs:
      resume_from:
        description: "Optional: enter soc or fit1 only for resume builds"
        required: false
        type: string

jobs:
  run-build:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Run run_build_sed.ps1 detached via WMI
        shell: powershell
        run: |
          $resumeFrom = "${{ github.event.inputs.resume_from }}".Trim()

          if ([string]::IsNullOrWhiteSpace($resumeFrom)) {
            $command = "powershell -NoExit -WindowStyle Normal -File C:\Users\pkummara\run_build_sed.ps1"
          } else {
            $command = "powershell -NoExit -WindowStyle Normal -File C:\Users\pkummara\run_build_sed.ps1 -ResumeFrom $resumeFrom"
          }

          Write-Host "Launching: $command"

          $wmi = [wmiclass]"\\.\root\cimv2:Win32_Process"
          $result = $wmi.Create($command)

          Write-Host "WMI Create ReturnValue: $($result.ReturnValue)"
          Write-Host "Started PID: $($result.ProcessId)"
