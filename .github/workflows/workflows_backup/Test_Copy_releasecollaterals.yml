name: Test - Copy Release Collaterals

on:
  workflow_dispatch:
    inputs:
      current_version:
        description: 'Current UP build version (e.g., F23816d3)'
        required: true
        type: string

jobs:
  test-copy-collaterals:
    runs-on: [self-hosted, node16]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy release collaterals (.inc and .pdb) to SRF host
        env:
          SRF_PASSWORD: ${{ secrets.SRF_PASSWORD }}
        run: |
          CURRENT_VERSION="${{ github.event.inputs.current_version }}"
          RELEASE_PATH="/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/${CURRENT_VERSION}/release"
          WINDOWS_DEST="C:/pkummara/IFWI_INC_PDB/Test"
          SRF_HOST="10.138.186.133"
          SRF_USER="CEFLS_User"

          echo "================================================="
          echo "  Test - Copy Release Collaterals to SRF Host"
          echo "================================================="
          echo "📁 Release Path : $RELEASE_PATH"
          echo "🖥️  SRF Host     : $SRF_HOST"
          echo "📂 Windows Dest : $WINDOWS_DEST"
          echo "📋 Version      : $CURRENT_VERSION"
          echo "================================================="

          chmod +x .github/scripts/scp_transfer.exp

          # ── Step 1: Verify release directory exists ──────────────
          if [ ! -d "$RELEASE_PATH" ]; then
            echo "❌ FAILURE: Release directory not found: $RELEASE_PATH"
            exit 1
          fi
          echo "✅ Release directory found: $RELEASE_PATH"

          # ── Step 2: Find .inc files (case-insensitive) ────────────
          echo ""
          echo "🔍 Searching for .inc files: m_*_*_${CURRENT_VERSION}.inc"
          INC_FILES=$(find "$RELEASE_PATH" -maxdepth 1 -iname "m_*_*_${CURRENT_VERSION}.inc" -type f)

          if [ -z "$INC_FILES" ]; then
            echo "❌ FAILURE: No .inc files found matching m_*_*_${CURRENT_VERSION}.inc"
            echo ""
            echo "📁 Files available in release directory:"
            ls -la "$RELEASE_PATH"
            exit 1
          fi
          echo "✅ Found .inc files:"
          echo "$INC_FILES"

          # ── Step 3: Find .pdb files (case-insensitive) ────────────
          echo ""
          echo "🔍 Searching for .pdb files: m_*_*_${CURRENT_VERSION}.pdb"
          PDB_FILES=$(find "$RELEASE_PATH" -maxdepth 1 -iname "m_*_*_${CURRENT_VERSION}.pdb" -type f)

          if [ -z "$PDB_FILES" ]; then
            echo "❌ FAILURE: No .pdb files found matching m_*_*_${CURRENT_VERSION}.pdb"
            echo ""
            echo "📁 Files available in release directory:"
            ls -la "$RELEASE_PATH"
            exit 1
          fi
          echo "✅ Found .pdb files:"
          echo "$PDB_FILES"

          # ── Step 4: SCP .inc files to Windows host ────────────────
          echo ""
          echo "📤 Copying .inc files to SRF host..."

          for INC_FILE in $INC_FILES; do
            FILENAME=$(basename "$INC_FILE")
            echo "  → Copying: $FILENAME"

            export SRC_FILE="$INC_FILE"
            export FILENAME="$FILENAME"
            export SRF_USER="$SRF_USER"
            export SRF_HOST="$SRF_HOST"
            export WINDOWS_DEST="$WINDOWS_DEST"

            /usr/bin/expect .github/scripts/scp_transfer.exp

            if [ $? -eq 0 ]; then
              echo "  ✅ Copied successfully: $FILENAME"
            else
              echo "  ❌ FAILURE: Failed to copy: $FILENAME"
              exit 1
            fi
          done

          # ── Step 5: SCP .pdb files to Windows host ────────────────
          echo ""
          echo "📤 Copying .pdb files to SRF host..."

          for PDB_FILE in $PDB_FILES; do
            FILENAME=$(basename "$PDB_FILE")
            echo "  → Copying: $FILENAME"

            export SRC_FILE="$PDB_FILE"
            export FILENAME="$FILENAME"
            export SRF_USER="$SRF_USER"
            export SRF_HOST="$SRF_HOST"
            export WINDOWS_DEST="$WINDOWS_DEST"

            /usr/bin/expect .github/scripts/scp_transfer.exp

            if [ $? -eq 0 ]; then
              echo "  ✅ Copied successfully: $FILENAME"
            else
              echo "  ❌ FAILURE: Failed to copy: $FILENAME"
              exit 1
            fi
          done

          # ── Step 6: Summary ───────────────────────────────────────
          echo ""
          echo "================================================="
          echo "✅ All release collaterals copied successfully!"
          echo "================================================="
          echo ""
          echo "📋 Files copied to ${SRF_HOST}:${WINDOWS_DEST}:"
          for INC_FILE in $INC_FILES; do echo "  ✅ $(basename $INC_FILE)"; done
          for PDB_FILE in $PDB_FILES; do echo "  ✅ $(basename $PDB_FILE)"; done
