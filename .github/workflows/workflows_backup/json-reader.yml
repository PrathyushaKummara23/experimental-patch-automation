name: JSON Entry Criteria Reader

on:
  workflow_dispatch:
    inputs:
      json_filename:
        description: 'JSON filename (e.g., entry_criteria_UPLR4.6.json)'
        required: true
        type: string
        default: 'entry_criteria_data.json'
  repository_dispatch:
    types: [trigger-json-reader]

jobs:
  read-json:
    runs-on: [self-hosted, node16]
    outputs:
      json_path: ${{ steps.validate.outputs.json_path }}
      previous_version: ${{ steps.extract_version.outputs.previous_version }}
      current_version: ${{ steps.extract_version.outputs.current_version }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set JSON filename from payload or input
      id: set_filename
      run: |
        # Check if triggered via repository_dispatch (API/token)
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          JSON_FILENAME="${{ github.event.client_payload.json_filename }}"
          echo "📡 Triggered via API with payload"
          echo "📄 JSON filename from payload: $JSON_FILENAME"
        else
          JSON_FILENAME="${{ github.event.inputs.json_filename }}"
          echo "🖱️ Triggered manually via UI"
          echo "📄 JSON filename from input: $JSON_FILENAME"
        fi
        
        # Set default if empty
        if [ -z "$JSON_FILENAME" ] || [ "$JSON_FILENAME" = "null" ]; then
          JSON_FILENAME="entry_criteria_data.json"
          echo "⚠️ No filename provided, using default: $JSON_FILENAME"
        fi
        
        echo "✅ Final JSON filename: $JSON_FILENAME"
        echo "json_filename=$JSON_FILENAME" >> $GITHUB_OUTPUT
      
    - name: Validate JSON file exists
      id: validate
      run: |
        JSON_FILENAME="${{ steps.set_filename.outputs.json_filename }}"
        JSON_FILE=".github/json_files/$JSON_FILENAME"
        
        echo "🔍 Validating JSON file: $JSON_FILE"
        
        if [ ! -f "$JSON_FILE" ]; then
          echo "❌ Error: JSON file '$JSON_FILENAME' not found!"
          echo ""
          echo "📁 Available JSON files in .github/json_files/:"
          if [ -d ".github/json_files" ]; then
            ls -la .github/json_files/ | grep '\.json$' | awk '{print "  - " $9}' || echo "  No JSON files found"
          else
            echo "  Directory .github/json_files/ does not exist"
          fi
          echo ""
          echo "💡 Make sure your JSON file is named correctly and placed in .github/json_files/"
          echo "💡 If triggering via API, ensure the payload contains: {\"json_filename\": \"your_file.json\"}"
          exit 1
        fi
        
        echo "✅ JSON file found: $JSON_FILE"
        echo "json_path=$JSON_FILE" >> $GITHUB_OUTPUT

    - name: Extract and Display Values
      id: extract_version
      run: |
        JSON_FILE="${{ steps.validate.outputs.json_path }}"
        
        echo "🔍 Reading JSON file: $JSON_FILE"
        echo "=================================================="
        echo ""
        
        # Function to extract value from section_1
        extract_section1_value() {
          local item="$1"
          jq -r --arg item "$item" '.section_1[] | select(.check_list_item == $item) | .entry' "$JSON_FILE"
        }
        
        # Function to extract Post Binary Staging Area from each section
        extract_staging_area() {
          local section="$1"
          jq -r --arg section "$section" '.[$section][0].entry // ""' "$JSON_FILE"
        }
        
        echo "📋 SECTION 1 VALUES:"
        echo "==================="
        milestone=$(extract_section1_value "Milestone")
        patch_desc=$(extract_section1_value "patch_description")
        version=$(extract_section1_value "version")
        svn=$(extract_section1_value "svn")
        se_svn=$(extract_section1_value "se_svn")
        min_svn=$(extract_section1_value "min_svn")
        min_runtime_id=$(extract_section1_value "min_runtime_id")
        patch_rollback_flags=$(extract_section1_value "patch_rollback_flags")
        prev_version=$(extract_section1_value "prev_version")
        
        echo "Milestone: $milestone"
        echo "Patch Description: $patch_desc"
        echo "Version: $version"
        echo "SVN: $svn"
        echo "SE_SVN: $se_svn"
        echo "Min SVN: $min_svn"
        echo "Min Runtime ID: $min_runtime_id"
        echo "Patch Rollback Flags: $patch_rollback_flags"
        echo "Previous Version: $prev_version"
        echo ""
        
        # Extract version numbers without 0x prefix
        clean_prev_version=$(echo "$prev_version" | sed 's/0x//')
        clean_current_version=$(echo "$version" | sed 's/0x//')
        
        echo "previous_version=$clean_prev_version" >> $GITHUB_OUTPUT
        echo "current_version=$clean_current_version" >> $GITHUB_OUTPUT
        
        echo "🔍 Extracted Previous Version for directory search: $clean_prev_version"
        echo "🔍 Extracted Current Version for renaming: $clean_current_version"
        
        echo "📦 POST BINARY STAGING AREAS:"
        echo "============================="
        
        # Extract staging areas for each component
        components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode-io" "pcode-c" "s3m")
        
        for component in "${components[@]}"; do
          staging_area=$(extract_staging_area "$component")
          if [ -n "$staging_area" ] && [ "$staging_area" != "null" ] && [ "$staging_area" != "" ]; then
            echo "$component Post Binary Staging Area: $staging_area"
          else
            echo "$component Post Binary Staging Area: [NOT AVAILABLE]"
          fi
        done
        
        echo ""
        echo "✅ JSON parsing completed successfully!"

    - name: Create Summary
      run: |
        JSON_FILE="${{ steps.validate.outputs.json_path }}"
        JSON_FILENAME="${{ steps.set_filename.outputs.json_filename }}"
        
        # Create a summary for the GitHub Actions summary page
        {
          echo "# 📊 JSON Entry Criteria Summary"
          echo ""
          echo "**File:** \`$JSON_FILENAME\`"
          echo "**Trigger:** ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "**Event Type:** ${{ github.event.action }}"
            echo "**Payload:** \`${{ toJson(github.event.client_payload) }}\`"
          fi
          echo ""
          echo "## 📋 Section 1 Values"
          echo "| Field | Value |"
          echo "|-------|-------|"
          
          # Extract and format section_1 values
          jq -r '.section_1[] | "| \(.check_list_item) | \(.entry) |"' "$JSON_FILE"
          
          echo ""
          echo "## 📦 Post Binary Staging Areas"
          echo "| Component | Path |"
          echo "|-----------|------|"
          
          # Extract staging areas
          components=("ucode" "xucode" "mcheck" "tcode" "acode" "icode" "oobmsm" "pcode-io" "pcode-c" "s3m")
          
          for component in "${components[@]}"; do
            staging_area=$(jq -r --arg comp "$component" '.[$comp][0].entry // ""' "$JSON_FILE")
            if [ -n "$staging_area" ] && [ "$staging_area" != "null" ] && [ "$staging_area" != "" ]; then
              echo "| $component | \`$staging_area\` |"
            else
              echo "| $component | *Not Available* |"
            fi
          done
          
        } >> $GITHUB_STEP_SUMMARY

  copy-config:
    runs-on: [self-hosted, node16]
    needs: read-json
    if: ${{ needs.read-json.outputs.previous_version != '' }}
    
    steps:
    - name: Copy Config File, Set Permissions and rename config file with current version
      run: |
        PREV_VERSION="${{ needs.read-json.outputs.previous_version }}"
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        BUILD_PATH="/nfs/site/disks/dcsg_0729/patches/SRF/C0/build"
        VERSION_PATH="$BUILD_PATH/$PREV_VERSION"
        RELEASE_PATH="$VERSION_PATH/release"
        CONFIG_FILE="config_${PREV_VERSION}.ini"
        SOURCE_CONFIG="$RELEASE_PATH/$CONFIG_FILE"
        DEST_PATH="/nfs/site/disks/dcsg_0729/users/pkummara"
        DEST_CONFIG="$DEST_PATH/$CONFIG_FILE"
        FINAL_CONFIG="$DEST_PATH/config_${CURRENT_VERSION}.ini"
        
        echo "🔍 Config File Copy Operation"
        echo "=================================================="
        echo "📋 Previous Version: $PREV_VERSION"
        echo "📋 Current Version: $CURRENT_VERSION"
        echo "📁 Build Path: $BUILD_PATH"
        echo "📂 Version Path: $VERSION_PATH"
        echo "📋 Release Path: $RELEASE_PATH"
        echo "📄 Config File: $CONFIG_FILE"
        echo "📥 Source: $SOURCE_CONFIG"
        echo "📤 Destination: $DEST_CONFIG"
        echo "🔄 Final Renamed File: $FINAL_CONFIG"
        echo "=================================================="
        
        # Check if version directory exists
        if [ ! -d "$VERSION_PATH" ]; then
          echo "❌ Error: Version directory '$VERSION_PATH' not found!"
          echo ""
          echo "📁 Available directories in build path:"
          if [ -d "$BUILD_PATH" ]; then
            ls -la "$BUILD_PATH" | grep '^d' | awk '{print "  - " $9}' | grep -v '^\.$\|^\.\.$' || echo "  No directories found"
          else
            echo "  Build path '$BUILD_PATH' does not exist"
          fi
          exit 1
        fi
        
        echo "✅ Version directory found: $VERSION_PATH"
        
        # Check if release directory exists
        if [ ! -d "$RELEASE_PATH" ]; then
          echo "❌ Error: Release directory '$RELEASE_PATH' not found!"
          echo ""
          echo "📁 Available directories in version path:"
          ls -la "$VERSION_PATH" | grep '^d' | awk '{print "  - " $9}' | grep -v '^\.$\|^\.\.$' || echo "  No directories found"
          exit 1
        fi
        
        echo "✅ Release directory found: $RELEASE_PATH"
        
        # Check if config file exists
        if [ ! -f "$SOURCE_CONFIG" ]; then
          echo "❌ Error: Config file '$SOURCE_CONFIG' not found!"
          echo ""
          echo "📁 Available files in release directory:"
          ls -la "$RELEASE_PATH" 2>/dev/null || echo "  Cannot list files in release directory"
          exit 1
        fi
        
        echo "✅ Config file found: $SOURCE_CONFIG"
        
        # Get source file info
        SOURCE_SIZE=$(stat -f%z "$SOURCE_CONFIG" 2>/dev/null || stat -c%s "$SOURCE_CONFIG" 2>/dev/null || echo "unknown")
        SOURCE_PERMS=$(ls -la "$SOURCE_CONFIG" | awk '{print $1}')
        echo "📊 Source file size: $SOURCE_SIZE bytes"
        echo "🔐 Source file permissions: $SOURCE_PERMS"
        
        # Check if destination directory exists, create if not
        if [ ! -d "$DEST_PATH" ]; then
          echo "📁 Creating destination directory: $DEST_PATH"
          mkdir -p "$DEST_PATH"
          if [ $? -eq 0 ]; then
            echo "✅ Destination directory created successfully"
          else
            echo "❌ Failed to create destination directory"
            exit 1
          fi
        else
          echo "✅ Destination directory exists: $DEST_PATH"
        fi
        
        # Copy the config file
        echo ""
        echo "📋 Copying config file..."
        echo "📄 cp '$SOURCE_CONFIG' '$DEST_CONFIG'"
        
        cp "$SOURCE_CONFIG" "$DEST_CONFIG"
        
        if [ $? -eq 0 ]; then
          echo "✅ Config file copied successfully!"
          
          # Verify the copy
          if [ -f "$DEST_CONFIG" ]; then
            DEST_SIZE=$(stat -f%z "$DEST_CONFIG" 2>/dev/null || stat -c%s "$DEST_CONFIG" 2>/dev/null || echo "unknown")
            echo "📊 Destination file size: $DEST_SIZE bytes"
            
            # Verify file integrity
            if [ "$SOURCE_SIZE" = "$DEST_SIZE" ]; then
              echo "✅ File integrity verified (sizes match)"
            else
              echo "⚠️  Warning: File sizes don't match (Source: $SOURCE_SIZE, Dest: $DEST_SIZE)"
            fi
          else
            echo "❌ Error: Destination file not found after copy"
            exit 1
          fi
        else
          echo "❌ Failed to copy config file"
          exit 1
        fi
        
        # Change permissions to 777
        echo ""
        echo "🔐 Setting permissions to 777..."
        echo "🔧 chmod 777 '$DEST_CONFIG'"
        
        chmod 777 "$DEST_CONFIG"
        
        if [ $? -eq 0 ]; then
          echo "✅ Permissions changed successfully to 777"
          
          # Verify permissions
          NEW_PERMS=$(ls -la "$DEST_CONFIG" | awk '{print $1}')
          echo "🔐 New file permissions: $NEW_PERMS"
          
          # Check if permissions are actually 777
          if [[ "$NEW_PERMS" == *"rwxrwxrwx"* ]]; then
            echo "✅ Permissions verified: 777 (rwxrwxrwx)"
          else
            echo "⚠️  Warning: Permissions may not be set correctly"
          fi
        else
          echo "❌ Failed to change permissions"
          exit 1
        fi
        
        # Rename the file to use current version (keeping .ini extension)
        echo ""
        echo "🔄 Renaming config file..."
        echo "📝 mv '$DEST_CONFIG' '$FINAL_CONFIG'"
        
        mv "$DEST_CONFIG" "$FINAL_CONFIG"
        
        if [ $? -eq 0 ]; then
          echo "✅ Config file renamed successfully!"
          
          # Verify the renamed file exists
          if [ -f "$FINAL_CONFIG" ]; then
            FINAL_SIZE=$(stat -f%z "$FINAL_CONFIG" 2>/dev/null || stat -c%s "$FINAL_CONFIG" 2>/dev/null || echo "unknown")
            FINAL_PERMS=$(ls -la "$FINAL_CONFIG" | awk '{print $1}')
            echo "📊 Final file size: $FINAL_SIZE bytes"
            echo "🔐 Final file permissions: $FINAL_PERMS"
            
            # Verify file integrity after rename
            if [ "$SOURCE_SIZE" = "$FINAL_SIZE" ]; then
              echo "✅ File integrity verified after rename (sizes match)"
            else
              echo "⚠️  Warning: File sizes don't match after rename (Source: $SOURCE_SIZE, Final: $FINAL_SIZE)"
            fi
          else
            echo "❌ Error: Final renamed file not found"
            exit 1
          fi
        else
          echo "❌ Failed to rename config file"
          exit 1
        fi
        
        echo ""
        echo "✅ Config file copy, permission, and rename operation completed successfully!"
        
        # Final summary
        echo ""
        echo "📋 OPERATION SUMMARY:"
        echo "===================="
        echo "✅ Source: $SOURCE_CONFIG"
        echo "✅ Final Destination: $FINAL_CONFIG"
        echo "✅ File Size: $FINAL_SIZE bytes"
        echo "✅ Permissions: 777 (rwxrwxrwx)"
        echo "✅ Previous Version: $PREV_VERSION"
        echo "✅ Current Version: $CURRENT_VERSION"
        echo "✅ Operation Status: SUCCESS"

    - name: Update Summary with Copy Results
      run: |
        PREV_VERSION="${{ needs.read-json.outputs.previous_version }}"
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        DEST_PATH="/nfs/site/disks/dcsg_0729/users/pkummara"
        FINAL_CONFIG="$DEST_PATH/config_${CURRENT_VERSION}.ini"
        
        {
          echo ""
          echo "## 📋 Config File Copy Results"
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Previous Version | $PREV_VERSION |"
          echo "| Current Version | $CURRENT_VERSION |"
          echo "| Source File | \`config_${PREV_VERSION}.ini\` |"
          echo "| Final File | \`config_${CURRENT_VERSION}.ini\` |"
          echo "| Source Path | \`/nfs/site/disks/dcsg_0729/patches/SRF/C0/build/$PREV_VERSION/release/config_${PREV_VERSION}.ini\` |"
          echo "| Final Path | \`$FINAL_CONFIG\` |"
          
          if [ -f "$FINAL_CONFIG" ]; then
            file_size=$(stat -f%z "$FINAL_CONFIG" 2>/dev/null || stat -c%s "$FINAL_CONFIG" 2>/dev/null || echo "unknown")
            file_perms=$(ls -la "$FINAL_CONFIG" | awk '{print $1}')
            echo "| File Size | $file_size bytes |"
            echo "| Permissions | $file_perms |"
            echo "| Status | ✅ SUCCESS |"
          else
            echo "| Status | ❌ FAILED |"
          fi
          
        } >> $GITHUB_STEP_SUMMARY

  prepare-config:
    runs-on: [self-hosted, node16]
    needs: [read-json, copy-config]
    if: ${{ needs.read-json.outputs.current_version != '' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Update Config File with JSON Values
      run: |
        JSON_FILE="${{ needs.read-json.outputs.json_path }}"
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        DEST_PATH="/nfs/site/disks/dcsg_0729/users/pkummara"
        CONFIG_FILE="$DEST_PATH/config_${CURRENT_VERSION}.ini"
        
        echo "🔧 Preparing Config File"
        echo "=================================================="
        echo "📋 Current Version: $CURRENT_VERSION"
        echo "📄 Config File: $CONFIG_FILE"
        echo "📥 JSON Source: $JSON_FILE"
        echo "=================================================="
        
        # Check if config file exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Error: Config file '$CONFIG_FILE' not found!"
          exit 1
        fi
        
        echo "✅ Config file found: $CONFIG_FILE"
        
        # Create backup of original config
        BACKUP_CONFIG="${CONFIG_FILE}.backup"
        cp "$CONFIG_FILE" "$BACKUP_CONFIG"
        echo "📋 Backup created: $BACKUP_CONFIG"
        
        # Extract values from JSON
        extract_section1_value() {
          local item="$1"
          jq -r --arg item "$item" '.section_1[] | select(.check_list_item == $item) | .entry' "$JSON_FILE"
        }
        
        extract_staging_area() {
          local section="$1"
          jq -r --arg section "$section" '.[$section][0].entry // ""' "$JSON_FILE"
        }
        
        # Get values from JSON
        milestone=$(extract_section1_value "Milestone")
        patch_desc=$(extract_section1_value "patch_description")
        version=$(extract_section1_value "version")
        svn=$(extract_section1_value "svn")
        se_svn=$(extract_section1_value "se_svn")
        min_svn=$(extract_section1_value "min_svn")
        prev_version=$(extract_section1_value "prev_version")
        
        # Get staging areas
        ucode_path=$(extract_staging_area "ucode")
        xucode_path=$(extract_staging_area "xucode")
        mcheck_path=$(extract_staging_area "mcheck")
        tcode_path=$(extract_staging_area "tcode")
        acode_path=$(extract_staging_area "acode")
        icode_path=$(extract_staging_area "icode")
        oobmsm_path=$(extract_staging_area "oobmsm")
        pcode_io_path=$(extract_staging_area "pcode-io")
        pcode_c_path=$(extract_staging_area "pcode-c")
        s3m_path=$(extract_staging_area "s3m")
        
        echo "🔍 Extracted JSON Values:"
        echo "Milestone: $milestone"
        echo "Version: $version"
        echo "SVN: $svn"
        echo "SE_SVN: $se_svn"
        echo "Min SVN: $min_svn"
        echo "Previous Version: $prev_version"
        echo ""
        
        # Update patch description if empty
        if [ -z "$patch_desc" ] || [ "$patch_desc" = "null" ] || [ "$patch_desc" = " " ]; then
          patch_desc="SRF Debug patch $milestone"
          echo "🔄 Generated patch description: $patch_desc"
        else
          echo "✅ Using existing patch description: $patch_desc"
        fi
        
        # Update config file values
        echo ""
        echo "🔧 Updating config file values..."
        
        # Update [default] section
        sed -i "s/^version = .*/version = $version/" "$CONFIG_FILE"
        sed -i "s/^patch_description = .*/patch_description = $patch_desc/" "$CONFIG_FILE"
        sed -i "s/^svn = .*/svn = $svn/" "$CONFIG_FILE"
        sed -i "s/^se_svn = .*/se_svn = $se_svn/" "$CONFIG_FILE"
        sed -i "s/^min_svn = .*/min_svn = $min_svn/" "$CONFIG_FILE"
        sed -i "s/^prev_version = .*/prev_version = $prev_version/" "$CONFIG_FILE"
        
        # Update [SOC] section paths
        if [ -n "$icode_path" ] && [ "$icode_path" != "null" ] && [ "$icode_path" != "" ]; then
          sed -i "s|^icode = .*|icode = $icode_path|" "$CONFIG_FILE"
          echo "✅ Updated icode path"
        fi
        
        if [ -n "$oobmsm_path" ] && [ "$oobmsm_path" != "null" ] && [ "$oobmsm_path" != "" ]; then
          sed -i "s|^oobmsm = .*|oobmsm = $oobmsm_path|" "$CONFIG_FILE"
          echo "✅ Updated oobmsm path"
        fi
        
        if [ -n "$s3m_path" ] && [ "$s3m_path" != "null" ] && [ "$s3m_path" != "" ]; then
          sed -i "s|^s3m = .*|s3m = $s3m_path|" "$CONFIG_FILE"
          echo "✅ Updated s3m path"
        fi
        
        if [ -n "$pcode_io_path" ] && [ "$pcode_io_path" != "null" ] && [ "$pcode_io_path" != "" ]; then
          sed -i "s|^pcode-io = .*|pcode-io = $pcode_io_path|" "$CONFIG_FILE"
          echo "✅ Updated pcode-io path"
        fi
        
        if [ -n "$pcode_c_path" ] && [ "$pcode_c_path" != "null" ] && [ "$pcode_c_path" != "" ]; then
          sed -i "s|^pcode-c = .*|pcode-c = $pcode_c_path|" "$CONFIG_FILE"
          echo "✅ Updated pcode-c path"
        fi
        
        # Update [FIT1] section paths
        if [ -n "$ucode_path" ] && [ "$ucode_path" != "null" ] && [ "$ucode_path" != "" ]; then
          sed -i "s|^ucode = .*|ucode = $ucode_path|" "$CONFIG_FILE"
          echo "✅ Updated ucode path"
        fi
        
        if [ -n "$xucode_path" ] && [ "$xucode_path" != "null" ] && [ "$xucode_path" != "" ]; then
          sed -i "s|^xucode = .*|xucode = $xucode_path|" "$CONFIG_FILE"
          echo "✅ Updated xucode path"
        fi
        
        if [ -n "$mcheck_path" ] && [ "$mcheck_path" != "null" ] && [ "$mcheck_path" != "" ]; then
          sed -i "s|^mcheck = .*|mcheck = $mcheck_path|" "$CONFIG_FILE"
          echo "✅ Updated mcheck path"
        fi
        
        # Handle tcode and acode (set to none if not available)
        if [ -z "$tcode_path" ] || [ "$tcode_path" = "null" ] || [ "$tcode_path" = "" ]; then
          sed -i "s|^tcode = .*|tcode = none|" "$CONFIG_FILE"
          echo "✅ Set tcode to none (not available)"
        else
          sed -i "s|^tcode = .*|tcode = $tcode_path|" "$CONFIG_FILE"
          echo "✅ Updated tcode path"
        fi
        
        if [ -z "$acode_path" ] || [ "$acode_path" = "null" ] || [ "$acode_path" = "" ]; then
          sed -i "s|^acode = .*|acode = none|" "$CONFIG_FILE"
          echo "✅ Set acode to none (not available)"
        else
          sed -i "s|^acode = .*|acode = $acode_path|" "$CONFIG_FILE"
          echo "✅ Updated acode path"
        fi
        
        # Ensure sign types are css-debug
        sed -i "s/^soc_sign = .*/soc_sign = css-debug/" "$CONFIG_FILE"
        sed -i "s/^fit1_sign = .*/fit1_sign = css-debug/" "$CONFIG_FILE"
        echo "✅ Updated sign types to css-debug"
        
        echo ""
        echo "✅ Config file update completed successfully!"
        
        # Show differences
        echo ""
        echo "📋 CHANGES MADE:"
        echo "================"
        echo "🔍 Comparing with backup..."
        if command -v diff >/dev/null 2>&1; then
          diff "$BACKUP_CONFIG" "$CONFIG_FILE" || true
        else
          echo "diff command not available, showing updated config file:"
          cat "$CONFIG_FILE"
        fi
        
        echo ""
        echo "📋 OPERATION SUMMARY:"
        echo "===================="
        echo "✅ Config file: $CONFIG_FILE"
        echo "✅ Backup file: $BACKUP_CONFIG"
        echo "✅ Updated version: $version"
        echo "✅ Updated patch description: $patch_desc"
        echo "✅ Updated SVN values and paths"
        echo "✅ Ensured css-debug signing"
        echo "✅ Operation Status: SUCCESS"

    - name: Update Summary with Config Preparation Results
      run: |
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        DEST_PATH="/nfs/site/disks/dcsg_0729/users/pkummara"
        CONFIG_FILE="$DEST_PATH/config_${CURRENT_VERSION}.ini"
        
        {
          echo ""
          echo "## 🔧 Config File Preparation Results"
          echo "| Field | Status |"
          echo "|-------|--------|"
          
          if [ -f "$CONFIG_FILE" ]; then
            echo "| Config File | ✅ Updated Successfully |"
            echo "| File Path | \`$CONFIG_FILE\` |"
            echo "| Backup Created | ✅ Yes |"
            echo "| Version Updated | ✅ Yes |"
            echo "| Paths Updated | ✅ Yes |"
            echo "| Sign Types | ✅ Set to css-debug |"
          else
            echo "| Config File | ❌ Update Failed |"
          fi
          
        } >> $GITHUB_STEP_SUMMARY

  upload-config:
    runs-on: [self-hosted, node16]
    needs: [read-json, copy-config, prepare-config]
    if: ${{ needs.read-json.outputs.current_version != '' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Config File to Repository
      run: |
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        DEST_PATH="/nfs/site/disks/dcsg_0729/users/pkummara"
        CONFIG_FILE="$DEST_PATH/config_${CURRENT_VERSION}.ini"
        REPO_OUTPUT_DIR="output_paths"
        REPO_CONFIG_FILE="$REPO_OUTPUT_DIR/config_${CURRENT_VERSION}.ini"
        
        echo "📤 Uploading Config File to Repository"
        echo "=================================================="
        echo "📋 Current Version: $CURRENT_VERSION"
        echo "📄 Source Config File: $CONFIG_FILE"
        echo "📁 Repository Output Directory: $REPO_OUTPUT_DIR"
        echo "📄 Repository Config File: $REPO_CONFIG_FILE"
        echo "=================================================="
        
        # Check if config file exists
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ Error: Config file '$CONFIG_FILE' not found!"
          exit 1
        fi
        
        echo "✅ Config file found: $CONFIG_FILE"
        
        # Create output_paths directory if it doesn't exist
        if [ ! -d "$REPO_OUTPUT_DIR" ]; then
          echo "📁 Creating output_paths directory..."
          mkdir -p "$REPO_OUTPUT_DIR"
          echo "✅ Directory created: $REPO_OUTPUT_DIR"
        else
          echo "✅ Directory exists: $REPO_OUTPUT_DIR"
        fi
        
        # Copy config file to repository
        echo ""
        echo "📋 Copying config file to repository..."
        echo "📄 cp '$CONFIG_FILE' '$REPO_CONFIG_FILE'"
        
        cp "$CONFIG_FILE" "$REPO_CONFIG_FILE"
        
        if [ $? -eq 0 ]; then
          echo "✅ Config file copied to repository successfully!"
          
          # Verify the copy
          if [ -f "$REPO_CONFIG_FILE" ]; then
            REPO_SIZE=$(stat -f%z "$REPO_CONFIG_FILE" 2>/dev/null || stat -c%s "$REPO_CONFIG_FILE" 2>/dev/null || echo "unknown")
            SOURCE_SIZE=$(stat -f%z "$CONFIG_FILE" 2>/dev/null || stat -c%s "$CONFIG_FILE" 2>/dev/null || echo "unknown")
            echo "📊 Repository file size: $REPO_SIZE bytes"
            
            # Verify file integrity
            if [ "$SOURCE_SIZE" = "$REPO_SIZE" ]; then
              echo "✅ File integrity verified (sizes match)"
            else
              echo "⚠️  Warning: File sizes don't match (Source: $SOURCE_SIZE, Repo: $REPO_SIZE)"
            fi
          else
            echo "❌ Error: Repository file not found after copy"
            exit 1
          fi
        else
          echo "❌ Failed to copy config file to repository"
          exit 1
        fi
        
        # Configure git
        echo ""
        echo "🔧 Configuring git..."
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add and commit the file
        echo ""
        echo "📋 Adding and committing config file..."
        git add "$REPO_CONFIG_FILE"
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️  No changes to commit (file might already exist with same content)"
        else
          echo "📝 Committing changes..."
          # Get the JSON filename for commit message
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            JSON_FILENAME="${{ github.event.client_payload.json_filename }}"
          else
            JSON_FILENAME="${{ github.event.inputs.json_filename }}"
          fi
          
          git commit -m "Add prepared config file: config_${CURRENT_VERSION}.ini
          
          - Generated from JSON: $JSON_FILENAME
          - Version: 0x${CURRENT_VERSION}
          - Triggered via: ${{ github.event_name }}
          - Automated by GitHub Actions workflow
          - Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          echo "✅ Config file committed successfully!"
          
          # Push changes
          echo ""
          echo "📤 Pushing changes to repository..."
          git push
          
          if [ $? -eq 0 ]; then
            echo "✅ Changes pushed to repository successfully!"
          else
            echo "❌ Failed to push changes to repository"
            exit 1
          fi
        fi
        
        echo ""
        echo "✅ Config file upload operation completed successfully!"
        
        # Final summary
        echo ""
        echo "📋 UPLOAD SUMMARY:"
        echo "=================="
        echo "✅ Source: $CONFIG_FILE"
        echo "✅ Repository Path: $REPO_CONFIG_FILE"
        echo "✅ File Size: $REPO_SIZE bytes"
        echo "✅ Git Status: Committed and Pushed"
        echo "✅ GitHub URL: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/$REPO_CONFIG_FILE"
        echo "✅ Operation Status: SUCCESS"

    - name: Update Summary with Upload Results
      run: |
        CURRENT_VERSION="${{ needs.read-json.outputs.current_version }}"
        REPO_CONFIG_FILE="output_paths/config_${CURRENT_VERSION}.ini"
        
        {
          echo ""
          echo "## 📤 Config File Upload Results"
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Config File | \`config_${CURRENT_VERSION}.ini\` |"
          echo "| Repository Path | \`$REPO_CONFIG_FILE\` |"
          echo "| GitHub URL | [View File](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/$REPO_CONFIG_FILE) |"
          
          if [ -f "$REPO_CONFIG_FILE" ]; then
            file_size=$(stat -f%z "$REPO_CONFIG_FILE" 2>/dev/null || stat -c%s "$REPO_CONFIG_FILE" 2>/dev/null || echo "unknown")
            echo "| File Size | $file_size bytes |"
            echo "| Status | ✅ SUCCESS |"
            echo "| Git Status | ✅ Committed & Pushed |"
          else
            echo "| Status | ❌ FAILED |"
          fi
          
          echo ""
          echo "### 📁 Repository Structure"
          echo "\`\`\`"
          echo "output_paths/"
          echo "├── config_${CURRENT_VERSION}.ini  ← New file added"
          if [ -d "output_paths" ]; then
            echo "├── $(ls output_paths/ | grep -v "config_${CURRENT_VERSION}.ini" | head -3 | tr '\n' ' ' | sed 's/ $//' | sed 's/ /\n├── /g')"
          fi
          echo "\`\`\`"
          
        } >> $GITHUB_STEP_SUMMARY
